appId: com.custom-office.app
productName: Custom Office
icon: build/icon.png
directories:
  output: dist
  buildResources: build
files:
  - "out/**/*"
  - "!node_modules/.cache/**"
  - "!tests/**"
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "${productName} ${version}.exe"
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  include: build/installer.nsh
  createDesktopShortcut: true
  createStartMenuShortcut: true
  perMachine: false
protocols:
  - name: Custom Office Protocol
    schemes:
      - customOffice
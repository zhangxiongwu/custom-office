<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Custom Office</title>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./main.tsx"></script>
  <script>
    // 创建定时器，每0.5秒检查一次iframe是否加载完成
    const checkTimer = setInterval(() => {
      // 获取frameEditor框架
      const frameWin = window.frames['frameEditor'];
      if (frameWin && !frameWin.document.getElementById('custom-style-container')) {
        // 创建style标签
        const style = frameWin.document.createElement('style');
        style.id = 'custom-style-container';
        // 屏蔽下载为 按钮
        style.textContent = `
          #fm-btn-download { display: none !important; }
          #fm-btn-protect { display: none !important; }
          #fm-btn-info { display: none !important; }
          #fm-btn-settings { display: none !important; }
          #panel-saveas { display: none !important; }
          #header-logo { display: none !important; }
        `;
        // 插入到框架head中
        frameWin.document.head.appendChild(style);
        // 执行完成后清除定时器
        // clearInterval(checkTimer);
      }
    }, 500);
  </script>
</body>
</html>

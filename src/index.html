<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'" />
  <title>Custom Office</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }

    .container {
      text-align: center;
      padding: 40px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    h1 {
      font-size: 48px;
      margin-bottom: 16px;
      font-weight: 700;
    }

    p {
      font-size: 18px;
      opacity: 0.9;
      margin-bottom: 24px;
    }

    .info {
      font-size: 14px;
      opacity: 0.7;
      margin-top: 32px;
    }

    .module-value {
      margin-top: 24px;
      font-size: 24px;
      font-weight: 700;
      color: #ffd700;
    }

    .badge {
      display: inline-block;
      padding: 6px 16px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      font-size: 14px;
      margin: 4px;
    }

    .protocol-section {
      margin-top: 32px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      text-align: left;
      font-size: 14px;
      max-width: 500px;
      word-break: break-all;
    }

    .protocol-section h3 {
      margin-bottom: 12px;
      font-size: 16px;
    }

    .protocol-field {
      margin-bottom: 6px;
    }

    .protocol-field strong {
      color: #ffd700;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hello World!33</h1>
    <p>Custom Office - Electron Desktop Application</p>
    <div class="badges">
      <span class="badge" id="electron-version">Electron: ...</span>
      <span class="badge" id="node-version">Node.js: ...</span>
      <span class="badge" id="chrome-version">Chrome: ...</span>
    </div>
    <div class="module-value">
      <span id="my-module-value">...</span>
    </div>
    <div class="info">Powered by Electron + Node.js 24</div>

    <div class="protocol-section" id="protocol-section" style="display: none;">
      <h3>收到的协议 URL</h3>
      <div class="protocol-field"><strong>原始URL:</strong> <span id="protocol-raw"></span></div>
      <div class="protocol-field"><strong>主机名:</strong> <span id="protocol-hostname"></span></div>
      <div class="protocol-field"><strong>路径:</strong> <span id="protocol-pathname"></span></div>
      <div class="protocol-field"><strong>参数:</strong> <span id="protocol-params"></span></div>
    </div>
  </div>

  <script>
    document.getElementById("electron-version").textContent =
      "Electron: " + window.versions.electron;
    document.getElementById("node-version").textContent =
      "Node.js: " + window.versions.node;
    document.getElementById("chrome-version").textContent =
      "Chrome: " + window.versions.chrome;
    document.getElementById("my-module-value").textContent =
      "模块值: " + window.myModule.value;

    // 处理协议 URL
    const protocolSection = document.getElementById("protocol-section");
    const protocolRaw = document.getElementById("protocol-raw");
    const protocolHostname = document.getElementById("protocol-hostname");
    const protocolPathname = document.getElementById("protocol-pathname");
    const protocolParams = document.getElementById("protocol-params");

    function displayProtocolUrl(data) {
      if (!data) return;
      protocolSection.style.display = "block";
      protocolRaw.textContent = data.raw || "";
      protocolHostname.textContent = data.hostname || "-";
      protocolPathname.textContent = data.pathname || "-";
      protocolParams.textContent = data.params
        ? JSON.stringify(data.params)
        : "-";

      console.log("收到协议 URL:", data);
    }

    // 主动获取启动时的协议 URL
    window.customProtocol.getStartupProtocolUrl().then((data) => {
      if (data) {
        displayProtocolUrl(data);
      }
    });

    // 监听后续通过协议唤起的 URL
    window.customProtocol.onProtocolUrl((data) => {
      displayProtocolUrl(data);
    });
  </script>
</body>
</html>
